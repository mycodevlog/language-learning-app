<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Language Practice Tool</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Language Practice Tool</h1>

  <div class="panel">

    <textarea id="inputText" placeholder="Paste or type sentences (one per line)"></textarea>

    <div class="controls">

      <label>Speed:</label>
      <select id="speed">
        <option value="0.7">Slow</option>
        <option value="1" selected>Normal</option>
        <option value="1.3">Fast</option>
      </select>

      <label>Repeat:</label>
      <select id="repeat">
        <option value="1">1x</option>
        <option value="3">3x</option>
        <option value="5">5x</option>
      </select>

      <button onclick="loadSentences()">Load</button>
      <button onclick="playAll()">Play All</button>

    </div>

  </div>

  <div id="list"></div>

  <script src="app.js"></script>
</body>
</html>
